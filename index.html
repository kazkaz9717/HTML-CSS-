<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>サイト模写</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>

  <!-- ヘッダー ここから -->
   <header class="header">

  <!-- ロゴ -->
  <a href="https://camp.potepan.com/" class="logo">
    <img src="https://camp.potepan.com/wp-content/themes/potepancamp/assets/images/header-logo.png" class="logo-img" alt="POTEPAN CAMP">
  </a>

  <!-- チェックボックス -->
  <input type="checkbox" id="menu-toggle">

  
  <!-- ハンバーガー -->
  <label for="menu-toggle" class="hamburger">
    <span></span>
    <span></span>
    <span></span>
  </label>

  <!-- メニュー -->
  <div class="menu">

    <nav class="nav">
      <ul>
        <li><a href="https://camp.potepan.com/content">CONTENT <br> <Span>学習内容</Span> </a></li>
        <li><a href="https://camp.potepan.com/interview">INTERVIEW <br> <span>受験生の声</span> </a></li>
        <li><a href="https://camp.potepan.com/faq">FAQ <br> <span>よくある質問</span> </a></li>
        <li><a href="https://camp.potepan.com/recruit">RECRUIT <br> <span>採用企業様へ</span> </a></li>
        <li><a href="https://camp.potepan.com/courses/free-under-29">U29 <br> <span>29歳以下の方へ</span> </a></li>
      </ul>
    </nav>

    <a href="https://camp.potepan.com/contact" class="btn btn-small">無料カウンセリング</a>

  </div>

</header>

  <!-- ヘッダーここまで -->


  <!-- ヒーロービュー ここから -->
  <section class="hero">

  <!-- 男性モデル、装飾 PC用-->
    <div class="hero-images">
      <!-- 男性モデル -->
      <img src="https://camp.potepan.com/wp-content/themes/potepancamp/assets/images/home/first-view/main-visual.webp" class="malemodel" alt="男性モデル">
      <!-- 左上三角形 -->
      <img src="https://camp.potepan.com/wp-content/themes/potepancamp/assets/images/home/first-view/left-rectangle.svg" class="triangle-upperleft" alt="左上三角形">
      <!-- 右下三角形 -->
      <img src="https://camp.potepan.com/wp-content/themes/potepancamp/assets/images/home/first-view/right-rectangle.svg" class="triangle-lowerright" alt="右下三角形">
      <!-- 楕円 -->
      <img src="https://camp.potepan.com/wp-content/themes/potepancamp/assets/images/home/first-view/fill-rectangle.svg" class="oval" alt="楕円">
      <!-- No.1バッジ -->
      <img src="https://camp.potepan.com/wp-content/themes/potepancamp/assets/images/home/first-view/badge.svg" class="badge" alt="No.1">
    </div>

    <!-- ===================== -->
    <!-- 男性モデル、装飾スマホ用 -->
    <!-- ===================== -->
     <div class="sp-images">
      <!-- 男性モデル、装飾セット -->
       <img src="https://camp.potepan.com/wp-content/themes/potepancamp/assets/images/home/first-view/whole-visual.webp" class="sp-hero-images" alt="男性モデル">
      <!-- No.1バッジ -->
       <img src="https://camp.potepan.com/wp-content/themes/potepancamp/assets/images/home/first-view/badge.svg" class="sp-badge" alt="No.1">
     </div>

   
        <!-- ヒーローテキスト -->
    <div class="hero-text">
      <h1>
        実践的カリキュラムと <br>
        豊富な提携求人で <br>
        確実にITエンジニアへ
      </h1>
    </div>

    <!-- 無料カウンセリングボタン 大 -->
    <a href="https://camp.potepan.com/contact" class="btn btn-big">まずは無料カウンセリングへ</a>

    <!-- 調査結果 -->
     <p class="survey-results">
      ※ショッパーズアイ「プログラミングスクール10社を対象にしたサイト比較イメージ調査 <br>
      （2020 年 5 月 22 日～25 日）」より全国の22～49歳の男女691名へのインターネット調査
     </p>

  </section>
